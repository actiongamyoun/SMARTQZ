<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚀 브레인 어드벤처</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --c0:#0a0e1a;--c1:#0d1b3e;--c2:#1a2f6b;
  --star:#f9d923;--comet:#60efff;--planet:#ff6b9d;
  --green:#39ff88;--orange:#ff9a3c;--red:#ff4d6d;--purple:#c084fc;
  --white:#f0f4ff;--muted:#7892c4;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--c0);min-height:100vh;
  color:var(--white);display:flex;flex-direction:column;align-items:center;padding-bottom:60px}

/* STARS */
#starfield{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star-dot{position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--d,3s) var(--delay,0s) infinite alternate}
@keyframes twinkle{from{opacity:.15;transform:scale(1)}to{opacity:1;transform:scale(1.5)}}

/* SCREENS */
.screen{display:none;flex-direction:column;align-items:center;
  position:relative;z-index:1;width:100%;max-width:580px;padding:0 16px}
.screen.active{display:flex}

/* ══ GRADE SCREEN ══ */
#gradeScreen{padding-top:32px;gap:18px}
.logo-wrap{text-align:center}
.logo-icon{font-size:4rem;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.logo-title{font-family:'Jua',cursive;font-size:2.6rem;color:var(--star);
  text-shadow:0 0 40px #f9d92366;margin-top:6px}
.logo-sub{color:var(--muted);font-size:.9rem;margin-top:4px}

.subject-row{display:flex;gap:10px;width:100%}
.subj-btn{flex:1;padding:13px 8px;border-radius:16px;border:2px solid;
  background:transparent;color:var(--white);font-family:'Jua',cursive;font-size:1rem;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s}
.subj-btn .si{font-size:1.5rem}
.subj-btn.mb{border-color:#60efff44;color:#60efff}
.subj-btn.mb.active{background:#60efff1a;border-color:#60efff;box-shadow:0 0 20px #60efff33}
.subj-btn.eb{border-color:#ff6b9d44;color:#ff6b9d}
.subj-btn.eb.active{background:#ff6b9d1a;border-color:#ff6b9d;box-shadow:0 0 20px #ff6b9d33}

.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%}
.grade-btn{background:linear-gradient(135deg,var(--c2),#0d1b3e);
  border:2px solid #1e3a8a;border-radius:18px;padding:16px 8px;
  cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.grade-btn:active{transform:scale(.95)}
.ge{font-size:1.9rem}.gn{font-family:'Jua',cursive;font-size:.95rem;color:var(--star)}
.gd{font-size:.65rem;color:var(--muted);text-align:center;line-height:1.3}
.gs{color:var(--star);font-size:.72rem}
.g1{border-color:#39ff8844}.g1:hover{border-color:#39ff88;box-shadow:0 0 20px #39ff8833}
.g2{border-color:#60efff44}.g2:hover{border-color:#60efff;box-shadow:0 0 20px #60efff33}
.g3{border-color:#f9d92344}.g3:hover{border-color:#f9d923;box-shadow:0 0 20px #f9d92333}
.g4{border-color:#ff9a3c44}.g4:hover{border-color:#ff9a3c;box-shadow:0 0 20px #ff9a3c33}
.g5{border-color:#ff6b9d44}.g5:hover{border-color:#ff6b9d;box-shadow:0 0 20px #ff6b9d33}
.g6{border-color:#a78bfa44}.g6:hover{border-color:#a78bfa;box-shadow:0 0 20px #a78bfa33}

/* ══ STORY BANNER ══ */
.story-banner{width:100%;background:linear-gradient(135deg,#0d1b3e,#1a1040);
  border:1.5px solid #2d3f80;border-radius:20px;padding:16px 18px;
  display:flex;align-items:center;gap:14px}
.story-planet{font-size:2.8rem;flex-shrink:0;animation:float 4s ease-in-out infinite}
.story-text .st{font-family:'Jua',cursive;font-size:1rem;color:var(--star);margin-bottom:4px}
.story-text .sd{font-size:.82rem;color:#a0b4d0;line-height:1.5}
.rocket-bar{width:100%;height:10px;background:#1a2f6b;border-radius:10px;overflow:hidden;margin-top:8px}
.rocket-fill{height:100%;border-radius:10px;transition:width .6s ease;
  background:linear-gradient(90deg,var(--orange),var(--star))}
.rocket-label{font-size:.72rem;color:var(--muted);margin-top:4px}

/* ══ QUIZ SCREEN ══ */
#quizScreen{padding-top:14px;gap:11px}

.hud{width:100%;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hud-grade{font-family:'Jua',cursive;font-size:.88rem;background:var(--c2);
  border:1.5px solid #1e3a8a;border-radius:30px;padding:5px 13px;
  cursor:pointer;color:var(--comet);transition:all .15s}
.hud-grade:hover{border-color:var(--comet)}
.hud-combo{font-family:'Jua',cursive;font-size:.88rem;color:var(--orange);
  background:#ff9a3c15;border:1.5px solid #ff9a3c44;
  border-radius:30px;padding:5px 13px;opacity:0;transition:opacity .3s}
.hud-combo.show{opacity:1}
.hud-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hud-score{font-family:'Jua',cursive;font-size:1rem;color:var(--star)}
.hud-lives{font-size:1.05rem;letter-spacing:1px}

.prog-bar{width:100%;height:8px;background:#1a2f6b;border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;transition:width .5s ease;
  background:linear-gradient(90deg,var(--comet),var(--planet))}

/* Q TYPE BADGE */
.q-card{width:100%;background:linear-gradient(135deg,#0d1b3e,#1a1040);
  border:1.5px solid #2d3f80;border-radius:22px;padding:20px 18px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;
  border-radius:50%;background:radial-gradient(circle,rgba(96,239,255,.06),transparent 70%)}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.q-type-badge{font-size:.68rem;font-weight:700;border-radius:8px;padding:3px 9px;letter-spacing:.5px}
.bt-story  {background:#1e3a5f;color:var(--comet)}
.bt-pattern{background:#2d1b4e;color:var(--purple)}
.bt-logic  {background:#1a3d2b;color:var(--green)}
.bt-word   {background:#3d1a1a;color:#fca5a5}
.bt-grammar{background:#2d2a0e;color:var(--star)}
.bt-ox     {background:#1a2d1a;color:var(--green)}
.bt-mcq    {background:#1a1a3d;color:var(--comet)}
.q-num{color:var(--muted);font-size:.78rem}
.q-fmt{font-size:.68rem;color:var(--orange);font-weight:700;
  background:#ff9a3c15;border:1px solid #ff9a3c44;border-radius:6px;padding:2px 7px}
.q-text{font-size:1.15rem;font-weight:700;line-height:1.75;color:var(--white);white-space:pre-line}
.q-scene{margin-top:10px;padding:10px 14px;background:rgba(255,255,255,.05);
  border-radius:12px;font-size:.86rem;color:#a0b8d8;line-height:1.6;
  border-left:3px solid var(--orange)}

/* OX BUTTONS */
.ox-wrap{display:flex;gap:16px;width:100%}
.ox-btn{flex:1;padding:28px 10px;border:2px solid;border-radius:20px;
  background:transparent;font-size:3rem;cursor:pointer;transition:all .2s;text-align:center}
.ox-o{border-color:#39ff8844;color:var(--green)}
.ox-o:hover,.ox-o.sel{background:#39ff8822;border-color:var(--green);box-shadow:0 0 24px #39ff8844;transform:scale(1.04)}
.ox-x{border-color:#ff4d6d44;color:var(--red)}
.ox-x:hover,.ox-x.sel{background:#ff4d6d22;border-color:var(--red);box-shadow:0 0 24px #ff4d6d44;transform:scale(1.04)}
.ox-label{font-family:'Jua',cursive;font-size:1rem;margin-top:6px;display:block}

/* MCQ BUTTONS */
.mcq-wrap{display:flex;flex-direction:column;gap:10px;width:100%}
.mcq-btn{width:100%;padding:14px 18px;border:1.5px solid #2d3f80;border-radius:14px;
  background:linear-gradient(135deg,#0d1b3e,#1a1040);
  color:var(--white);font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:12px}
.mcq-btn:hover{border-color:var(--comet);background:#60efff0d}
.mcq-btn.sel{border-color:var(--comet);background:#60efff1a;box-shadow:0 0 16px #60efff33}
.mcq-btn.correct-ans{border-color:var(--green);background:#39ff881a}
.mcq-btn.wrong-ans{border-color:var(--red);background:#ff4d6d1a}
.mcq-num{width:28px;height:28px;border-radius:50%;background:#1a2f6b;
  display:flex;align-items:center;justify-content:center;
  font-family:'Jua',cursive;font-size:.82rem;flex-shrink:0}

/* CANVAS */
.canvas-outer{width:100%;background:#070d1e;border:1.5px dashed #2d3f80;border-radius:18px;
  overflow:hidden;position:relative;touch-action:none;-webkit-user-select:none;user-select:none}
.canvas-outer canvas{display:block;width:100%;touch-action:none;
  -webkit-touch-callout:none;-webkit-user-select:none}
.canvas-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#2d3f80;font-size:.88rem;text-align:center;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:5px;transition:opacity .2s}
.ch-icon{font-size:1.8rem}

.toolbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.t-btn{border:none;border-radius:11px;padding:7px 12px;font-size:.8rem;font-weight:700;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.t-btn:active{transform:scale(.93)}
.btn-clear{background:#ff4d6d1a;color:var(--red);border:1px solid #ff4d6d33}
.btn-undo {background:#f9d9231a;color:var(--star);border:1px solid #f9d92333}
.cdot{width:24px;height:24px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:border-color .15s;flex-shrink:0}
.cdot.sel{border-color:#fff}
.pen-wrap{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--muted)}
.pen-wrap input{width:60px;accent-color:var(--comet)}

/* HINT */
.hint-row{display:flex;align-items:center;gap:10px;width:100%}
.hint-btn{background:transparent;border:1.5px solid #f9d92333;color:var(--star);
  border-radius:11px;padding:6px 13px;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s}
.hint-btn:hover{background:#f9d9230d;border-color:var(--star)}
.hint-cost{font-size:.75rem;color:var(--muted)}
.hint-box{width:100%;background:#1a1500;border:1.5px solid #f9d92355;border-radius:13px;
  padding:11px 15px;font-size:.86rem;color:#fde68a;line-height:1.6;display:none;animation:fadeIn .3s ease}
.hint-box.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

/* SUBMIT */
.btn-submit{width:100%;padding:15px;border:none;border-radius:18px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:#fff;font-family:'Jua',cursive;font-size:1.05rem;cursor:pointer;
  box-shadow:0 4px 20px #2563eb33;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:active{transform:scale(.97)}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* RESULT */
.result-card{width:100%;border-radius:18px;padding:16px 18px;display:none;animation:fadeIn .3s ease}
.result-card.show{display:block}
.result-card.correct{background:#0a2a1a;border:1.5px solid var(--green)}
.result-card.wrong  {background:#2a0a0a;border:1.5px solid var(--red)}
.result-card.loading{background:#1a1200;border:1.5px solid var(--star)}
.res-title{font-family:'Jua',cursive;font-size:1.3rem;margin-bottom:5px}
.res-body{font-size:.88rem;color:#b0c0e0;line-height:1.7}
.res-answer{margin-top:9px;background:rgba(255,255,255,.06);border-radius:9px;
  padding:8px 13px;font-size:.86rem;color:var(--white);font-weight:700}

.btn-next{width:100%;padding:14px;border:none;border-radius:18px;
  background:linear-gradient(135deg,#059669,#0d9488);
  color:#fff;font-family:'Jua',cursive;font-size:.98rem;cursor:pointer;
  display:none;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 18px #05966933;transition:all .2s}
.btn-next.show{display:flex}
.btn-next:active{transform:scale(.97)}

/* ══ FINISH SCREEN ══ */
#finishScreen{padding-top:50px;gap:14px;text-align:center}
.fin-planet{font-size:5rem;animation:float 3s ease-in-out infinite}
.fin-title{font-family:'Jua',cursive;font-size:2rem;color:var(--star);text-shadow:0 0 30px #f9d92355}
.fin-stars{font-size:2.4rem;letter-spacing:4px}
.fin-score{font-family:'Jua',cursive;font-size:2.8rem;color:var(--comet)}
.fin-story{width:100%;background:linear-gradient(135deg,#0d1b3e,#1a1040);
  border:1.5px solid #2d3f80;border-radius:18px;padding:16px 18px;font-size:.9rem;
  color:#a0b8d8;line-height:1.6;text-align:left}
.fin-story strong{color:var(--star);font-family:'Jua',cursive}
.fin-stats{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-box{background:var(--c1);border:1.5px solid #1e3a8a;border-radius:14px;padding:12px;text-align:center}
.stat-num{font-family:'Jua',cursive;font-size:1.5rem;color:var(--star)}
.stat-lbl{font-size:.72rem;color:var(--muted);margin-top:2px}
.fin-msg{font-size:.95rem;color:var(--muted);max-width:320px;line-height:1.6}
.btn-again{padding:14px 36px;background:linear-gradient(135deg,var(--planet),#7c3aed);
  border:none;border-radius:18px;color:#fff;font-family:'Jua',cursive;
  font-size:1rem;cursor:pointer;box-shadow:0 4px 18px #ff6b9d33;transition:all .2s}
.btn-again:active{transform:scale(.97)}

/* EFFECTS */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999}
.cf{position:absolute;border-radius:2px;animation:fall var(--d,1.5s) var(--dl,0s) ease-in forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0) translateX(0);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg) translateX(var(--dx,0px));opacity:0}}
.combo-burst{position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);
  font-family:'Jua',cursive;font-size:2rem;color:var(--orange);
  text-shadow:0 0 20px #ff9a3caa;pointer-events:none;z-index:999;
  display:none;animation:burst .8s ease forwards}
@keyframes burst{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  80%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-62%) scale(.9)}}
.loading-dots span{display:inline-block;animation:bounce .7s infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

@media(max-width:400px){
  .q-text{font-size:1rem}
  .logo-title{font-size:2rem}
  .grade-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="starfield"></div>
<div class="combo-burst" id="comboBurst"></div>

<!-- ═══ GRADE SCREEN ═══ -->
<div class="screen active" id="gradeScreen">
  <div class="logo-wrap">
    <span class="logo-icon">🚀</span>
    <div class="logo-title">브레인 어드벤처</div>
    <div class="logo-sub">우주를 탐험하며 생각하는 힘을 키워요!</div>
  </div>
  <div class="subject-row">
    <button class="subj-btn mb active" id="subjMath" onclick="selectSubject('math')">
      <span class="si">🔢</span>수학
    </button>
    <button class="subj-btn eb" id="subjEng" onclick="selectSubject('english')">
      <span class="si">🔤</span>영어
    </button>
  </div>
  <div class="grade-grid">
    <button class="grade-btn g1" onclick="startQuiz(1)">
      <span class="ge">🌱</span><span class="gn">1학년</span>
      <span class="gd">달 탐험</span><span class="gs">★☆☆☆☆☆</span>
    </button>
    <button class="grade-btn g2" onclick="startQuiz(2)">
      <span class="ge">🌊</span><span class="gn">2학년</span>
      <span class="gd">화성 탐험</span><span class="gs">★★☆☆☆☆</span>
    </button>
    <button class="grade-btn g3" onclick="startQuiz(3)">
      <span class="ge">⚡</span><span class="gn">3학년</span>
      <span class="gd">목성 탐험</span><span class="gs">★★★☆☆☆</span>
    </button>
    <button class="grade-btn g4" onclick="startQuiz(4)">
      <span class="ge">🔥</span><span class="gn">4학년</span>
      <span class="gd">토성 탐험</span><span class="gs">★★★★☆☆</span>
    </button>
    <button class="grade-btn g5" onclick="startQuiz(5)">
      <span class="ge">🪐</span><span class="gn">5학년</span>
      <span class="gd">천왕성 탐험</span><span class="gs">★★★★★☆</span>
    </button>
    <button class="grade-btn g6" onclick="startQuiz(6)">
      <span class="ge">🌌</span><span class="gn">6학년</span>
      <span class="gd">은하 탐험</span><span class="gs">★★★★★★</span>
    </button>
  </div>
</div>

<!-- ═══ QUIZ SCREEN ═══ -->
<div class="screen" id="quizScreen">
  <!-- STORY BANNER -->
  <div class="story-banner">
    <div class="story-planet" id="storyPlanet">🚀</div>
    <div class="story-text">
      <div class="st" id="storyTitle">미션 시작!</div>
      <div class="sd" id="storyDesc">문제를 풀어 로켓에 연료를 채워요!</div>
      <div class="rocket-bar"><div class="rocket-fill" id="rocketFill" style="width:0%"></div></div>
      <div class="rocket-label" id="rocketLabel">연료 0%</div>
    </div>
  </div>

  <!-- HUD -->
  <div class="hud">
    <button class="hud-grade" onclick="goHome()" id="hudGrade">🚀 1학년</button>
    <div class="hud-combo" id="hudCombo">🔥 콤보 ×0</div>
    <div class="hud-right">
      <div class="hud-score">⭐ <span id="scoreDisp">0</span></div>
      <div class="hud-lives" id="livesDisp">❤️❤️❤️</div>
    </div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <!-- Q CARD -->
  <div class="q-card">
    <div class="q-meta">
      <span class="q-type-badge" id="qTypeBadge">📖 스토리</span>
      <span class="q-fmt" id="qFmt">✋ 손글씨</span>
      <span class="q-num" id="qNum">1 / 10</span>
    </div>
    <div class="q-text" id="qText">문제 로딩 중...</div>
    <div class="q-scene" id="qScene" style="display:none"></div>
  </div>

  <!-- HINT -->
  <div class="hint-row">
    <button class="hint-btn" onclick="toggleHint()">💡 힌트</button>
    <span class="hint-cost">힌트 사용 시 -2점</span>
  </div>
  <div class="hint-box" id="hintBox"></div>

  <!-- OX -->
  <div class="ox-wrap" id="oxWrap" style="display:none">
    <button class="ox-btn ox-o" onclick="selectOX('O')">
      ⭕<span class="ox-label">맞아요</span>
    </button>
    <button class="ox-btn ox-x" onclick="selectOX('X')">
      ❌<span class="ox-label">틀려요</span>
    </button>
  </div>

  <!-- MCQ -->
  <div class="mcq-wrap" id="mcqWrap" style="display:none"></div>

  <!-- CANVAS (손글씨) -->
  <div class="canvas-outer" id="canvasOuter" style="display:none">
    <canvas id="drawCanvas"></canvas>
    <div class="canvas-hint" id="canvasHint">
      <span class="ch-icon">✍️</span><span>풀이와 답을 여기에 쓰세요</span>
    </div>
  </div>
  <div class="toolbar" id="toolbar" style="display:none">
    <button class="t-btn btn-clear" onclick="clearCanvas()">🗑️ 지우기</button>
    <button class="t-btn btn-undo"  onclick="undoStroke()">↩️ 되돌리기</button>

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let grade=1, subject='math';
let currentQ=null, qIndex=0;
let score=0, correctCount=0, comboCount=0, maxCombo=0;
let lives=3, hintsUsed=0, hintUsedThisQ=false;
let usedIndices=[], selectedAnswer=null;
const TOTAL=10;

// ════════════════════════════════════════════════════════
//  CANVAS
// ════════════════════════════════════════════════════════
let canvas, ctx, drawing=false;
let penColor='#f0f4ff', penSz=4;
let strokes=[], curStroke=[], touchActive=false;

function initCanvas(){
  canvas=document.getElementById('drawCanvas');
  ctx=canvas.getContext('2d');
  canvas.addEventListener('pointerdown',sd,{passive:false});
  canvas.addEventListener('pointermove',dr,{passive:false});
  canvas.addEventListener('pointerup',ed,{passive:false});
  canvas.addEventListener('pointercancel',ed,{passive:false});
  canvas.addEventListener('touchstart',tsd,{passive:false});
  canvas.addEventListener('touchmove',tdr,{passive:false});
  canvas.addEventListener('touchend',ted,{passive:false});
  window.addEventListener('resize',resizeCanvas);
}
function resizeCanvas(){
  const outer=document.getElementById('canvasOuter');
  const w=outer.getBoundingClientRect().width||outer.offsetWidth||320;
  const h=Math.max(200,Math.min(280,window.innerHeight*.26));
  canvas.width=Math.round(w); canvas.height=Math.round(h);
  outer.style.height=h+'px'; redraw();
}
function gp(cx,cy){
  const r=canvas.getBoundingClientRect();
  return{x:(cx-r.left)*(canvas.width/(r.width||1)),y:(cy-r.top)*(canvas.height/(r.height||1))};
}
function sd(e){if(e.pointerType==='touch'&&touchActive)return;e.preventDefault();drawing=true;
  try{canvas.setPointerCapture(e.pointerId);}catch(_){}
  curStroke=[];const p=gp(e.clientX,e.clientY);curStroke.push({x:p.x,y:p.y,c:penColor,s:penSz});
  document.getElementById('canvasHint').style.opacity='0';}
function dr(e){if(!drawing||(e.pointerType==='touch'&&touchActive))return;e.preventDefault();
  const p=gp(e.clientX,e.clientY);curStroke.push({x:p.x,y:p.y,c:penColor,s:penSz});redraw();drawStroke(curStroke);}
function ed(e){if(e.pointerType==='touch'&&touchActive)return;if(!drawing)return;
  drawing=false;if(curStroke.length>1)strokes.push([...curStroke]);curStroke=[];}
function tsd(e){e.preventDefault();touchActive=true;drawing=true;curStroke=[];
  const t=e.touches[0],p=gp(t.clientX,t.clientY);curStroke.push({x:p.x,y:p.y,c:penColor,s:penSz});
  document.getElementById('canvasHint').style.opacity='0';}
function tdr(e){if(!drawing)return;e.preventDefault();
  const t=e.touches[0],p=gp(t.clientX,t.clientY);curStroke.push({x:p.x,y:p.y,c:penColor,s:penSz});
  redraw();drawStroke(curStroke);}
function ted(e){e.preventDefault();touchActive=false;if(!drawing)return;
  drawing=false;if(curStroke.length>1)strokes.push([...curStroke]);curStroke=[];}
function drawStroke(pts){if(pts.length<2)return;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.strokeStyle=pts[0].c;ctx.lineWidth=pts[0].s;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();}
function redraw(){ctx.clearRect(0,0,canvas.width,canvas.height);strokes.forEach(s=>drawStroke(s));}
function clearCanvas(){strokes=[];curStroke=[];redraw();document.getElementById('canvasHint').style.opacity='1';}
function undoStroke(){if(strokes.length>0){strokes.pop();redraw();}}
function setColor(el){penColor=el.dataset.c;document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel'));el.classList.add('sel');}

// ════════════════════════════════════════════════════════
//  SCREENS
// ════════════════════════════════════════════════════════
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function selectSubject(s){subject=s;document.getElementById('subjMath').classList.toggle('active',s==='math');document.getElementById('subjEng').classList.toggle('active',s==='english');}
function goHome(){showScreen('gradeScreen');score=0;correctCount=0;comboCount=0;maxCombo=0;lives=3;hintsUsed=0;qIndex=0;usedIndices=[];selectedAnswer=null;}

// ════════════════════════════════════════════════════════
//  QUIZ
// ════════════════════════════════════════════════════════
function startQuiz(g){
  grade=g;qIndex=0;score=0;correctCount=0;comboCount=0;maxCombo=0;lives=3;hintsUsed=0;usedIndices=[];selectedAnswer=null;
  document.getElementById('hudGrade').textContent=`🚀 ${g}학년`;
  const st=STORY[g];
  document.getElementById('storyPlanet').textContent=st.planet;
  document.getElementById('storyTitle').textContent=st.mission;
  document.getElementById('storyDesc').textContent=st.desc;
  updateHUD();
  showScreen('quizScreen');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{resizeCanvas();loadQuestion();}));
}

function pickQ(){
  const pool=QB[subject][grade];
  const avail=pool.map((_,i)=>i).filter(i=>!usedIndices.includes(i));
  if(!avail.length){usedIndices=[];return pickQ();}
  const i=avail[Math.floor(Math.random()*avail.length)];
  usedIndices.push(i);
  return pool[i];
}

function loadQuestion(){
  currentQ=pickQ();selectedAnswer=null;hintUsedThisQ=false;
  const typeLabel={story:'📖 스토리',pattern:'🔢 패턴',logic:'🧠 논리',word:'📝 단어',grammar:'📚 문법'};
  const fmtLabel={ox:'⭕❌ OX',mcq:'🔘 객관식',write:'✋ 손글씨'};
  document.getElementById('qTypeBadge').textContent=typeLabel[currentQ.type]||'📖';
  document.getElementById('qTypeBadge').className='q-type-badge '+currentQ.badge;
  document.getElementById('qFmt').textContent=fmtLabel[currentQ.fmt]||'✋';
  document.getElementById('qNum').textContent=(qIndex+1)+' / '+TOTAL;
  document.getElementById('qText').textContent=currentQ.text;
  const sceneEl=document.getElementById('qScene');
  if(currentQ.scene){sceneEl.textContent=currentQ.scene;sceneEl.style.display='block';}
  else sceneEl.style.display='none';
  document.getElementById('hintBox').textContent=currentQ.hint;
  document.getElementById('hintBox').classList.remove('show');
  document.getElementById('progFill').style.width=(qIndex/TOTAL*100)+'%';
  updateRocket();

  // show correct input area
  document.getElementById('oxWrap').style.display='none';
  document.getElementById('mcqWrap').style.display='none';
  document.getElementById('canvasOuter').style.display='none';
  document.getElementById('toolbar').style.display='none';
  document.querySelectorAll('.ox-btn').forEach(b=>b.classList.remove('sel'));

  if(currentQ.fmt==='ox'){
    document.getElementById('oxWrap').style.display='flex';
  } else if(currentQ.fmt==='mcq'){
    buildMCQ();
    document.getElementById('mcqWrap').style.display='flex';
  } else {
    document.getElementById('canvasOuter').style.display='block';
    document.getElementById('toolbar').style.display='flex';
    clearCanvas();
  }

  document.getElementById('submitBtn').textContent=currentQ.fmt==='write'?'🤖 AI 채점하기':'확인하기 ✓';
  document.getElementById('submitBtn').disabled=false;
  hideResult();
  document.getElementById('nextBtn').classList.remove('show');
  updateHUD();
}

function buildMCQ(){
  const wrap=document.getElementById('mcqWrap');
  wrap.innerHTML='';
  const labels=['①','②','③','④'];
  currentQ.choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='mcq-btn';
    btn.innerHTML=`<span class="mcq-num">${labels[i]}</span>${c}`;
    btn.onclick=()=>selectMCQ(btn,c);
    wrap.appendChild(btn);
  });
}

function selectMCQ(btn,val){
  if(document.getElementById('nextBtn').classList.contains('show'))return;
  document.querySelectorAll('.mcq-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  selectedAnswer=val;
}

function selectOX(val){
  if(document.getElementById('nextBtn').classList.contains('show'))return;
  selectedAnswer=val;
  document.querySelectorAll('.ox-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelector(val==='O'?'.ox-o':'.ox-x').classList.add('sel');
}

function toggleHint(){
  const box=document.getElementById('hintBox');
  box.classList.toggle('show');
  if(box.classList.contains('show')&&!hintUsedThisQ){hintUsedThisQ=true;hintsUsed++;score=Math.max(0,score-2);updateHUD();}
}

function updateHUD(){
  document.getElementById('scoreDisp').textContent=score;
  document.getElementById('livesDisp').textContent='❤️'.repeat(lives)+'🖤'.repeat(Math.max(0,3-lives));
  const cc=document.getElementById('hudCombo');
  if(comboCount>=2){cc.textContent=`🔥 콤보 ×${comboCount}`;cc.classList.add('show');}
  else cc.classList.remove('show');
}

function updateRocket(){
  const pct=Math.round((qIndex/TOTAL)*100);
  document.getElementById('rocketFill').style.width=pct+'%';
  document.getElementById('rocketLabel').textContent=`연료 ${pct}%`;
}

function hideResult(){const r=document.getElementById('resultCard');r.className='result-card';r.style.display='none';document.getElementById('resAnswer').style.display='none';}

// ════════════════════════════════════════════════════════
//  SUBMIT
// ════════════════════════════════════════════════════════
async function submitAnswer(){
  if(currentQ.fmt==='ox'||currentQ.fmt==='mcq'){
    if(!selectedAnswer){showResult('loading','👆 먼저 답을 선택해주세요!','',null);return;}
    gradeInstant();
  } else {
    if(strokes.length===0){showResult('loading','✏️ 먼저 답을 써주세요!','',null);return;}
    await gradeAI();
  }
}

function gradeInstant(){
  document.getElementById('submitBtn').disabled=true;
  const correct = selectedAnswer===currentQ.answer;
  processResult(correct, correct?'정답이에요! 잘했어요 👏':'아쉽지만 틀렸어요. 다시 생각해봐요!', '', selectedAnswer);

  // highlight MCQ
  if(currentQ.fmt==='mcq'){
    document.querySelectorAll('.mcq-btn').forEach(btn=>{
      const txt=btn.textContent.replace(/[①②③④]/,'').trim();
      if(txt===currentQ.answer) btn.classList.add('correct-ans');
      else if(btn.classList.contains('sel')) btn.classList.add('wrong-ans');
    });
  }
}

async function gradeAI(){
  document.getElementById('submitBtn').disabled=true;
  showResult('loading','<span class="loading-dots"><span>🤖</span><span>채점</span><span>중...</span></span>','',null);
  const imageData=canvas.toDataURL('image/jpeg',0.85).split(',')[1];
  try{
    const res=await fetch('/api/grade',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({imageData,question:currentQ.text,answer:currentQ.answer,hint:currentQ.hint,grade,type:currentQ.type})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));document.getElementById('submitBtn').disabled=false;showResult('wrong','⚠️ 오류',e.error||`서버 오류 (${res.status})`,null);return;}
    const r=await res.json();
    processResult(r.correct,r.feedback,r.explanation,r.recognized);
  }catch(e){
    document.getElementById('submitBtn').disabled=false;
    showResult('wrong','⚠️ 네트워크 오류','인터넷 연결을 확인해주세요.',null);
  }
}

function processResult(correct,feedback,explanation,recognized){
  qIndex++;
  const pts=hintUsedThisQ?(correct?8:0):(correct?10:0);
  if(correct){score+=pts;correctCount++;comboCount++;if(comboCount>maxCombo)maxCombo=comboCount;showCombo();}
  else{lives=Math.max(0,lives-1);comboCount=0;}
  updateHUD();updateRocket();

  if(correct){
    showResult('correct','🎉 정답이에요!',feedback, recognized?`인식: ${recognized} ✓ (+${pts}점)`:`+${pts}점`);
    launchConfetti();
  } else {
    showResult('wrong','❌ 아쉬워요!',feedback+(explanation?'<br>'+explanation:''),`정답: ${currentQ.answer}`+(recognized?`  |  인식: ${recognized}`:''));
  }

  if(qIndex>=TOTAL||lives<=0) setTimeout(showFinish,1800);
  else document.getElementById('nextBtn').classList.add('show');
}

function showResult(type,title,body,answer){
  const c=document.getElementById('resultCard');
  c.className='result-card show '+type;c.style.display='block';
  document.getElementById('resTitle').innerHTML=title;
  document.getElementById('resBody').innerHTML=body;
  const a=document.getElementById('resAnswer');
  if(answer){a.textContent=answer;a.style.display='block';}else a.style.display='none';
}

function nextQuestion(){loadQuestion();}

// ════════════════════════════════════════════════════════
//  FINISH
// ════════════════════════════════════════════════════════
function showFinish(){
  showScreen('finishScreen');
  const pct=correctCount/TOTAL;
  const sc=pct>=.9?5:pct>=.7?4:pct>=.5?3:pct>=.3?2:1;
  document.getElementById('finStars').textContent='⭐'.repeat(sc)+'☆'.repeat(5-sc);
  document.getElementById('finScore').textContent=score+'점';
  document.getElementById('stC').textContent=correctCount+'/'+qIndex;
  document.getElementById('stB').textContent=maxCombo+'연속';
  document.getElementById('stH').textContent=hintsUsed+'번';
  document.getElementById('stG').textContent=grade+'학년';
  const planets=['🌱','🔴','🟠','🪐','🔵','🌌'];
  document.getElementById('finPlanet').textContent=planets[grade-1];
  const st=STORY[grade];
  const storyEndings=[
    `아직 갈 길이 멀어요. 다시 도전해봐요!`,
    `조금만 더 노력하면 ${st.name} 정복이에요!`,
    `절반 이상 성공! ${st.name}이 눈앞이에요!`,
    `거의 다 왔어요! 다음엔 완벽하게 정복해요!`,
    sc>=5?st.win:`대단해요! 조금만 더 하면 완벽!`
  ];
  document.getElementById('finStory').innerHTML=`<strong>${st.mission}</strong><br>${storyEndings[Math.min(sc-1,4)]}`;
  const msgs=['다시 도전! 할 수 있어요 💪','조금만 더 연습해봐요 🔥','잘하고 있어요! ⭐','훌륭해요! 거의 완벽! 🎯','우주 최강 탐험가! 🏆'];
  document.getElementById('finMsg').textContent=msgs[Math.min(sc-1,4)];
  if(sc>=4)launchConfetti(true);
}

// ════════════════════════════════════════════════════════
//  EFFECTS
// ════════════════════════════════════════════════════════
function launchConfetti(big=false){
  const n=big?70:28,colors=['#f9d923','#ff6b9d','#60efff','#39ff88','#ff9a3c','#c084fc'];
  const wrap=document.createElement('div');wrap.className='confetti-wrap';
  for(let i=0;i<n;i++){
    const c=document.createElement('div');c.className='cf';
    c.style.cssText=`left:${Math.random()*100}%;background:${colors[i%colors.length]};width:${5+Math.random()*9}px;height:${5+Math.random()*9}px;--d:${1+Math.random()*1.6}s;--dl:${Math.random()*.6}s;--dx:${(Math.random()-.5)*220}px;border-radius:${Math.random()>.5?'50%':'3px'};`;
    wrap.appendChild(c);
  }
  document.body.appendChild(wrap);setTimeout(()=>wrap.remove(),2600);
}

function showCombo(){
  if(comboCount<2)return;
  const el=document.getElementById('comboBurst');
  el.textContent=comboCount>=5?`🔥 ${comboCount}연속! 천재!`:comboCount>=3?`⚡ ${comboCount}연속! 대박!`:`🎯 ${comboCount}연속!`;
  el.style.display='block';el.style.animation='none';void el.offsetWidth;
  el.style.animation='burst .8s ease forwards';
  setTimeout(()=>el.style.display='none',900);
}

function makeStars(){
  const sf=document.getElementById('starfield');
  for(let i=0;i<90;i++){
    const s=document.createElement('div');s.className='star-dot';
    const sz=Math.random()*2.5+.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    sf.appendChild(s);
  }
}

window.addEventListener('DOMContentLoaded',()=>{initCanvas();makeStars();});
</script>
