<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚀 브레인 어드벤처</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --c0:#0a0e1a; --c1:#0d1b3e; --c2:#1a2f6b;
  --star:#f9d923; --comet:#60efff; --planet:#ff6b9d;
  --green:#39ff88; --orange:#ff9a3c; --red:#ff4d6d;
  --white:#f0f4ff; --muted:#7892c4;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--c0); min-height:100vh;
  color:var(--white);
  display:flex; flex-direction:column; align-items:center;
  padding-bottom:60px;
}

/* STARS */
#starfield{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star-dot{position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--d,3s) var(--delay,0s) infinite alternate}
@keyframes twinkle{from{opacity:.2;transform:scale(1)}to{opacity:1;transform:scale(1.5)}}

/* SCREENS */
.screen{display:none;flex-direction:column;align-items:center;
  position:relative;z-index:1;width:100%;max-width:560px;padding:0 16px}
.screen.active{display:flex}

/* ── GRADE SCREEN ── */
#gradeScreen{padding-top:40px;gap:20px}
.logo-icon{font-size:4rem;display:block;animation:float 3s ease-in-out infinite;text-align:center}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.logo-title{font-family:'Jua',cursive;font-size:2.4rem;color:var(--star);
  text-shadow:0 0 30px #f9d92388;text-align:center;margin-top:8px}
.logo-sub{color:var(--muted);font-size:.95rem;text-align:center}

.subject-row{display:flex;gap:10px;width:100%}
.subj-btn{
  flex:1;padding:14px 10px;border-radius:16px;border:2px solid;
  background:transparent;color:var(--white);
  font-family:'Jua',cursive;font-size:1rem;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s;
}
.subj-btn .sicon{font-size:1.6rem}
.subj-btn.math-btn{border-color:#60efff44;color:#60efff}
.subj-btn.math-btn.active{background:#60efff22;border-color:#60efff;box-shadow:0 0 16px #60efff44}
.subj-btn.eng-btn{border-color:#ff6b9d44;color:#ff6b9d}
.subj-btn.eng-btn.active{background:#ff6b9d22;border-color:#ff6b9d;box-shadow:0 0 16px #ff6b9d44}

.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%}
.grade-btn{
  background:linear-gradient(135deg,var(--c2),#0d1b3e);
  border:2px solid #1e3a8a;border-radius:18px;
  padding:18px 8px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.grade-btn:active{transform:scale(.95)}
.grade-btn .g-emoji{font-size:2rem}
.grade-btn .g-name{font-family:'Jua',cursive;font-size:1rem;color:var(--star)}
.grade-btn .g-desc{font-size:.68rem;color:var(--muted);text-align:center;line-height:1.3}
.grade-btn .g-stars{color:var(--star);font-size:.75rem}
.grade-btn.g1{border-color:#39ff8855}.grade-btn.g1:hover{border-color:#39ff88;box-shadow:0 0 20px #39ff8844}
.grade-btn.g2{border-color:#60efff55}.grade-btn.g2:hover{border-color:#60efff;box-shadow:0 0 20px #60efff44}
.grade-btn.g3{border-color:#f9d92355}.grade-btn.g3:hover{border-color:#f9d923;box-shadow:0 0 20px #f9d92344}
.grade-btn.g4{border-color:#ff9a3c55}.grade-btn.g4:hover{border-color:#ff9a3c;box-shadow:0 0 20px #ff9a3c44}
.grade-btn.g5{border-color:#ff6b9d55}.grade-btn.g5:hover{border-color:#ff6b9d;box-shadow:0 0 20px #ff6b9d44}
.grade-btn.g6{border-color:#a78bfa55}.grade-btn.g6:hover{border-color:#a78bfa;box-shadow:0 0 20px #a78bfa44}

/* ── QUIZ SCREEN ── */
#quizScreen{padding-top:16px;gap:12px}

.hud{width:100%;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hud-grade{
  font-family:'Jua',cursive;font-size:.9rem;
  background:var(--c2);border:1.5px solid #1e3a8a;
  border-radius:30px;padding:5px 14px;cursor:pointer;color:var(--comet);transition:all .15s;
}
.hud-grade:hover{border-color:var(--comet)}
.hud-combo{
  font-family:'Jua',cursive;font-size:.9rem;color:var(--orange);
  background:#ff9a3c18;border:1.5px solid #ff9a3c44;
  border-radius:30px;padding:5px 14px;opacity:0;transition:opacity .3s;
}
.hud-combo.show{opacity:1}
.hud-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hud-score{font-family:'Jua',cursive;font-size:1rem;color:var(--star)}
.hud-lives{font-size:1.1rem;letter-spacing:2px}

.prog-bar{width:100%;height:8px;background:#1a2f6b;border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;transition:width .5s ease;
  background:linear-gradient(90deg,var(--comet),var(--planet))}

.q-card{
  width:100%;background:linear-gradient(135deg,#0d1b3e,#1a1040);
  border:1.5px solid #2d3f80;border-radius:24px;padding:22px 20px;
  position:relative;overflow:hidden;
}
.q-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(96,239,255,.07),transparent 70%);
}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.q-type-badge{font-size:.7rem;font-weight:700;border-radius:8px;padding:3px 10px;letter-spacing:.5px}
.badge-story  {background:#1e3a5f;color:var(--comet)}
.badge-pattern{background:#2d1b4e;color:#c084fc}
.badge-logic  {background:#1a3d2b;color:var(--green)}
.badge-word   {background:#3d1a1a;color:#fca5a5}
.badge-grammar{background:#2d2a0e;color:var(--star)}
.q-num{color:var(--muted);font-size:.8rem}
.q-text{font-size:1.2rem;font-weight:700;line-height:1.7;color:var(--white);white-space:pre-line}

.hint-row{display:flex;align-items:center;gap:10px;width:100%}
.hint-btn{
  background:transparent;border:1.5px solid #f9d92344;
  color:var(--star);border-radius:12px;padding:7px 14px;
  font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;
}
.hint-btn:hover{background:#f9d92311;border-color:var(--star)}
.hint-cost{font-size:.78rem;color:var(--muted)}
.hint-box{
  width:100%;background:#1a1500;border:1.5px solid #f9d92366;
  border-radius:14px;padding:12px 16px;font-size:.88rem;color:#fde68a;
  line-height:1.6;display:none;animation:fadeIn .3s ease;
}
.hint-box.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

/* CANVAS */
.canvas-outer{
  width:100%;background:#070d1e;
  border:1.5px dashed #2d3f80;border-radius:20px;
  overflow:hidden;position:relative;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
}
.canvas-outer canvas{
  display:block;width:100%;
  touch-action:none;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
}
.canvas-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#2d3f80;font-size:.9rem;text-align:center;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:opacity .2s;
}
.canvas-hint .ch-icon{font-size:2rem}

.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.t-btn{
  border:none;border-radius:12px;padding:8px 13px;
  font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:4px;
}
.t-btn:active{transform:scale(.93)}
.btn-clear{background:#ff4d6d22;color:var(--red);border:1px solid #ff4d6d44}
.btn-undo {background:#f9d92322;color:var(--star);border:1px solid #f9d92344}
.cdot{width:26px;height:26px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:border-color .15s;flex-shrink:0}
.cdot.sel{border-color:#fff}
.pen-wrap{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
.pen-wrap input{width:65px;accent-color:var(--comet)}

.btn-submit{
  width:100%;padding:16px;border:none;border-radius:20px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:#fff;font-family:'Jua',cursive;font-size:1.1rem;cursor:pointer;
  box-shadow:0 4px 24px #2563eb44;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-submit:active{transform:scale(.97)}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

.result-card{
  width:100%;border-radius:20px;padding:18px 20px;
  display:none;animation:fadeIn .3s ease;
}
.result-card.show{display:block}
.result-card.correct{background:#0a2a1a;border:1.5px solid var(--green)}
.result-card.wrong  {background:#2a0a0a;border:1.5px solid var(--red)}
.result-card.loading{background:#1a1200;border:1.5px solid var(--star)}
.res-title{font-family:'Jua',cursive;font-size:1.35rem;margin-bottom:6px}
.res-body{font-size:.9rem;color:#b0c0e0;line-height:1.7}
.res-answer{
  margin-top:10px;background:rgba(255,255,255,.06);
  border-radius:10px;padding:9px 14px;font-size:.88rem;color:var(--white);font-weight:700;
}

.btn-next{
  width:100%;padding:15px;border:none;border-radius:20px;
  background:linear-gradient(135deg,#059669,#0d9488);
  color:#fff;font-family:'Jua',cursive;font-size:1rem;cursor:pointer;
  display:none;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 20px #05966944;transition:all .2s;
}
.btn-next.show{display:flex}
.btn-next:active{transform:scale(.97)}

/* ── FINISH SCREEN ── */
#finishScreen{padding-top:60px;gap:16px;text-align:center}
.finish-planet{font-size:5rem;animation:float 3s ease-in-out infinite}
.finish-title{font-family:'Jua',cursive;font-size:2rem;color:var(--star);text-shadow:0 0 30px #f9d92366}
.star-display{font-size:2.5rem;letter-spacing:4px}
.finish-score-big{font-family:'Jua',cursive;font-size:3rem;color:var(--comet)}
.finish-stats{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.stat-box{background:var(--c1);border:1.5px solid #1e3a8a;border-radius:16px;padding:14px;text-align:center}
.stat-num{font-family:'Jua',cursive;font-size:1.6rem;color:var(--star)}
.stat-lbl{font-size:.75rem;color:var(--muted);margin-top:2px}
.finish-msg{font-size:1rem;color:var(--muted);max-width:320px;line-height:1.6}
.btn-again{
  padding:15px 40px;background:linear-gradient(135deg,var(--planet),#7c3aed);
  border:none;border-radius:20px;color:#fff;font-family:'Jua',cursive;
  font-size:1.05rem;cursor:pointer;box-shadow:0 4px 20px #ff6b9d44;transition:all .2s;
}
.btn-again:active{transform:scale(.97)}

/* EFFECTS */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999}
.cf{position:absolute;border-radius:2px;
  animation:fall var(--d,1.5s) var(--dl,0s) ease-in forwards}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0) translateX(0);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg) translateX(var(--dx,0px));opacity:0}
}
.combo-burst{
  position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);
  font-family:'Jua',cursive;font-size:2rem;color:var(--orange);
  text-shadow:0 0 20px #ff9a3caa;pointer-events:none;z-index:999;
  display:none;animation:burst .8s ease forwards;
}
@keyframes burst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  80%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-60%) scale(.9)}
}
.loading-dots span{display:inline-block;animation:bounce .7s infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

@media(max-width:400px){
  .q-text{font-size:1.05rem}
  .logo-title{font-size:2rem}
  .grade-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div id="starfield"></div>
<div class="combo-burst" id="comboBurst"></div>

<!-- ═══ GRADE SCREEN ═══ -->
<div class="screen active" id="gradeScreen">
  <span class="logo-icon">🚀</span>
  <div class="logo-title">브레인 어드벤처</div>
  <div class="logo-sub">생각하는 힘을 키워요!</div>

  <div class="subject-row">
    <button class="subj-btn math-btn active" id="subjMath" onclick="selectSubject('math')">
      <span class="sicon">🔢</span>수학
    </button>
    <button class="subj-btn eng-btn" id="subjEng" onclick="selectSubject('english')">
      <span class="sicon">🔤</span>영어
    </button>
  </div>

  <div class="grade-grid">
    <button class="grade-btn g1" onclick="startQuiz(1)">
      <span class="g-emoji">🌱</span><span class="g-name">1학년</span>
      <span class="g-desc">기초 탐험</span><span class="g-stars">★☆☆☆☆☆</span>
    </button>
    <button class="grade-btn g2" onclick="startQuiz(2)">
      <span class="g-emoji">🌊</span><span class="g-name">2학년</span>
      <span class="g-desc">기초 심화</span><span class="g-stars">★★☆☆☆☆</span>
    </button>
    <button class="grade-btn g3" onclick="startQuiz(3)">
      <span class="g-emoji">⚡</span><span class="g-name">3학년</span>
      <span class="g-desc">논리 시작</span><span class="g-stars">★★★☆☆☆</span>
    </button>
    <button class="grade-btn g4" onclick="startQuiz(4)">
      <span class="g-emoji">🔥</span><span class="g-name">4학년</span>
      <span class="g-desc">응용 도전</span><span class="g-stars">★★★★☆☆</span>
    </button>
    <button class="grade-btn g5" onclick="startQuiz(5)">
      <span class="g-emoji">🪐</span><span class="g-name">5학년</span>
      <span class="g-desc">심화 탐구</span><span class="g-stars">★★★★★☆</span>
    </button>
    <button class="grade-btn g6" onclick="startQuiz(6)">
      <span class="g-emoji">🌌</span><span class="g-name">6학년</span>
      <span class="g-desc">최고 난이도</span><span class="g-stars">★★★★★★</span>
    </button>
  </div>
</div>

<!-- ═══ QUIZ SCREEN ═══ -->
<div class="screen" id="quizScreen">
  <div class="hud">
    <button class="hud-grade" onclick="goHome()" id="hudGrade">🚀 1학년</button>
    <div class="hud-combo" id="hudCombo">🔥 콤보 ×0</div>
    <div class="hud-right">
      <div class="hud-score">⭐ <span id="scoreDisp">0</span></div>
      <div class="hud-lives" id="livesDisp">❤️❤️❤️</div>
    </div>
  </div>

  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div class="q-card">
    <div class="q-meta">
      <span class="q-type-badge" id="qTypeBadge">📖 스토리</span>
      <span class="q-num" id="qNum">1 / 8</span>
    </div>
    <div class="q-text" id="qText">문제 로딩 중...</div>
  </div>

  <div class="hint-row">
    <button class="hint-btn" onclick="toggleHint()">💡 힌트 보기</button>
    <span class="hint-cost">힌트 사용 시 -2점</span>
  </div>
  <div class="hint-box" id="hintBox"></div>

  <div class="canvas-outer" id="canvasOuter">
    <canvas id="drawCanvas"></canvas>
    <div class="canvas-hint" id="canvasHint">
      <span class="ch-icon">✍️</span>
      <span>풀이와 답을 여기에 쓰세요</span>
    </div>
  </div>

  <div class="toolbar">
    <button class="t-btn btn-clear" onclick="clearCanvas()">🗑️ 지우기</button>
    <button class="t-btn btn-undo"  onclick="undoStroke()">↩️ 되돌리기</button>
    <div class="cdot sel" style="background:#f0f4ff" data-c="#f0f4ff" onclick="setColor(this)"></div>
    <div class="cdot"     style="background:#ff4d6d" data-c="#ff4d6d" onclick="setColor(this)"></div>
    <div class="cdot"     style="background:#60efff" data-c="#60efff" onclick="setColor(this)"></div>
    <div class="cdot"     style="background:#39ff88" data-c="#39ff88" onclick="setColor(this)"></div>
    <div class="pen-wrap">🖊️<input type="range" min="2" max="16" value="4" oninput="penSz=+this.value"></div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">🤖 AI 채점하기</button>

  <div class="result-card" id="resultCard">
    <div class="res-title" id="resTitle"></div>
    <div class="res-body"  id="resBody"></div>
    <div class="res-answer" id="resAnswer" style="display:none"></div>
  </div>

  <button class="btn-next" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
</div>

<!-- ═══ FINISH SCREEN ═══ -->
<div class="screen" id="finishScreen">
  <div class="finish-planet" id="finPlanet">🏆</div>
  <div class="finish-title">퀴즈 완료!</div>
  <div class="star-display" id="finStars">☆☆☆☆☆</div>
  <div class="finish-score-big" id="finScore">0점</div>
  <div class="finish-stats">
    <div class="stat-box"><div class="stat-num" id="statCorrect">0</div><div class="stat-lbl">✅ 정답</div></div>
    <div class="stat-box"><div class="stat-num" id="statCombo">0</div><div class="stat-lbl">🔥 최고 콤보</div></div>
    <div class="stat-box"><div class="stat-num" id="statHints">0</div><div class="stat-lbl">💡 힌트 사용</div></div>
    <div class="stat-box"><div class="stat-num" id="statGrade">-</div><div class="stat-lbl">🏫 학년</div></div>
  </div>
  <div class="finish-msg" id="finMsg"></div>
  <button class="btn-again" onclick="goHome()">🚀 다시 시작</button>
</div>

<script>
// ══════════════════════════════════════════════════════
//  QUESTION BANK
// ══════════════════════════════════════════════════════
const QB = {
  math: {
    1:[
      {type:'story',badge:'badge-story',text:'사탕이 3개 있었어요. 친구에게 2개를 더 받았어요.\n지금 사탕은 모두 몇 개인가요?',answer:'5',hint:'처음 개수와 받은 개수를 합쳐요'},
      {type:'story',badge:'badge-story',text:'버스에 어른이 4명, 어린이가 5명 타고 있어요.\n버스에 탄 사람은 모두 몇 명인가요?',answer:'9',hint:'어른 수 + 어린이 수 = ?'},
      {type:'pattern',badge:'badge-pattern',text:'규칙을 찾아 빈칸을 채우세요.\n1, 2, 3, 4, ___',answer:'5',hint:'1씩 커지는 규칙이에요'},
      {type:'story',badge:'badge-story',text:'사과가 10개 있어요. 3개를 먹었어요.\n남은 사과는 몇 개인가요?',answer:'7',hint:'10에서 먹은 수를 빼요'},
      {type:'pattern',badge:'badge-pattern',text:'빈칸에 알맞은 수를 쓰세요.\n2, 4, 6, 8, ___',answer:'10',hint:'2씩 커지는 규칙이에요'},

  const w = outer.getBoundingClientRect().width || outer.offsetWidth || 320;
  const h = Math.max(200, Math.min(300, window.innerHeight * 0.28));
  canvas.width  = Math.round(w);
  canvas.height = Math.round(h);
  outer.style.height = h + 'px';
  redraw();
}

function gp(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (cx - r.left) * (canvas.width  / (r.width  || 1)),
    y: (cy - r.top)  * (canvas.height / (r.height || 1))
  };
}

function sd(e) {
  if (e.pointerType === 'touch' && touchActive) return;
  e.preventDefault();
  drawing = true;
  try { canvas.setPointerCapture(e.pointerId); } catch(_) {}
  curStroke = [];
  const p = gp(e.clientX, e.clientY);
  curStroke.push({x:p.x, y:p.y, c:penColor, s:penSz});
  document.getElementById('canvasHint').style.opacity = '0';
}
function dr(e) {
  if (!drawing || (e.pointerType === 'touch' && touchActive)) return;
  e.preventDefault();
  const p = gp(e.clientX, e.clientY);
  curStroke.push({x:p.x, y:p.y, c:penColor, s:penSz});
  redraw(); drawStroke(curStroke);
}
function ed(e) {
  if (e.pointerType === 'touch' && touchActive) return;
  if (!drawing) return;
  drawing = false;
  if (curStroke.length > 1) strokes.push([...curStroke]);
  curStroke = [];
}
function tsd(e) {
  e.preventDefault(); touchActive = true; drawing = true;
  curStroke = [];
  const t = e.touches[0], p = gp(t.clientX, t.clientY);
  curStroke.push({x:p.x, y:p.y, c:penColor, s:penSz});
  document.getElementById('canvasHint').style.opacity = '0';
}
function tdr(e) {
  if (!drawing) return; e.preventDefault();
  const t = e.touches[0], p = gp(t.clientX, t.clientY);
  curStroke.push({x:p.x, y:p.y, c:penColor, s:penSz});
  redraw(); drawStroke(curStroke);
}
function ted(e) {
  e.preventDefault(); touchActive = false;
  if (!drawing) return; drawing = false;
  if (curStroke.length > 1) strokes.push([...curStroke]);
  curStroke = [];
}

function drawStroke(pts) {
  if (pts.length < 2) return;
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.strokeStyle = pts[0].c; ctx.lineWidth = pts[0].s;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
}
function redraw() { ctx.clearRect(0,0,canvas.width,canvas.height); strokes.forEach(s=>drawStroke(s)); }
function clearCanvas() { strokes=[]; curStroke=[]; redraw(); document.getElementById('canvasHint').style.opacity='1'; }
function undoStroke() { if(strokes.length>0){strokes.pop();redraw();} }
function setColor(el) { penColor=el.dataset.c; document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel')); el.classList.add('sel'); }

// ══════════════════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function selectSubject(s) {
  subject = s;
  document.getElementById('subjMath').classList.toggle('active', s==='math');
  document.getElementById('subjEng').classList.toggle('active', s==='english');
}
function goHome() {
  showScreen('gradeScreen');
  score=0; correctCount=0; comboCount=0; maxCombo=0; lives=3; hintsUsed=0; qIndex=0; usedIndices=[];
}

// ══════════════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════════════
function startQuiz(g) {
  grade=g; qIndex=0; score=0; correctCount=0;
  comboCount=0; maxCombo=0; lives=3; hintsUsed=0; usedIndices=[];
  document.getElementById('hudGrade').textContent = `🚀 ${g}학년`;
  updateHUD();
  showScreen('quizScreen');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    resizeCanvas();
    loadQuestion();
  }));
}

function pickQ() {
  const pool = QB[subject][grade];
  const avail = pool.map((_,i)=>i).filter(i=>!usedIndices.includes(i));
  if (!avail.length) { usedIndices=[]; return pickQ(); }
  const i = avail[Math.floor(Math.random()*avail.length)];
  usedIndices.push(i);
  return pool[i];
}

function loadQuestion() {
  currentQ = pickQ();
  hintUsedThisQ = false;
  const typeLabel = {story:'📖 스토리',pattern:'🔢 패턴',logic:'🧠 논리',word:'📝 단어',grammar:'📚 문법'};
  document.getElementById('qTypeBadge').textContent = typeLabel[currentQ.type] || '📖';
  document.getElementById('qTypeBadge').className = 'q-type-badge ' + currentQ.badge;
  document.getElementById('qNum').textContent = (qIndex+1) + ' / ' + TOTAL;
  document.getElementById('qText').textContent = currentQ.text;
  document.getElementById('hintBox').textContent = currentQ.hint;
  document.getElementById('hintBox').classList.remove('show');
  document.getElementById('progFill').style.width = (qIndex/TOTAL*100)+'%';
  clearCanvas();
  hideResult();
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('nextBtn').classList.remove('show');
  updateHUD();
}

function toggleHint() {
  const box = document.getElementById('hintBox');
  box.classList.toggle('show');
  if (box.classList.contains('show') && !hintUsedThisQ) {
    hintUsedThisQ=true; hintsUsed++;
    score=Math.max(0,score-2);
    updateHUD();
  }
}

function updateHUD() {
  document.getElementById('scoreDisp').textContent = score;
  document.getElementById('livesDisp').textContent = '❤️'.repeat(lives)+'🖤'.repeat(Math.max(0,3-lives));
  const cc = document.getElementById('hudCombo');
  if (comboCount>=2) { cc.textContent=`🔥 콤보 ×${comboCount}`; cc.classList.add('show'); }
  else cc.classList.remove('show');
}

function hideResult() {
  const r = document.getElementById('resultCard');
  r.className='result-card'; r.style.display='none';
  document.getElementById('resAnswer').style.display='none';
}

// ══════════════════════════════════════════════════════
//  AI GRADING  — /api/grade (Netlify Function)
// ══════════════════════════════════════════════════════
async function submitAnswer() {
  if (strokes.length===0) {
    showResult('loading','✏️ 먼저 답을 써주세요!','',null);
    return;
  }
  document.getElementById('submitBtn').disabled = true;
  showResult('loading','<span class="loading-dots"><span>🤖</span><span>채점</span><span>중...</span></span>','',null);

  const imageData = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  try {
    const res = await fetch('/api/grade', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        imageData,
        question: currentQ.text,
        answer:   currentQ.answer,
        hint:     currentQ.hint,
        grade,
        type: currentQ.type
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      document.getElementById('submitBtn').disabled = false;
      showResult('wrong', '⚠️ 오류', err.error || `서버 오류 (${res.status})`, null);
      return;
    }

    const r = await res.json();

    qIndex++;
    const pts = hintUsedThisQ ? (r.correct?8:0) : (r.correct?10:0);
    if (r.correct) { score+=pts; correctCount++; comboCount++; if(comboCount>maxCombo) maxCombo=comboCount; showCombo(); }
    else           { lives=Math.max(0,lives-1); comboCount=0; }
    updateHUD();

    if (r.correct) {
      showResult('correct','🎉 정답이에요!', r.feedback, `인식: ${r.recognized} ✓ (+${pts}점)`);
    } else {
      showResult('wrong','❌ 아쉬워요!', r.feedback+(r.explanation?'<br>'+r.explanation:''), `정답: ${currentQ.answer}  |  인식: ${r.recognized}`);
    }

    if (qIndex>=TOTAL || lives<=0) setTimeout(showFinish, 1800);
    else document.getElementById('nextBtn').classList.add('show');
    if (r.correct) launchConfetti();

  } catch(e) {
    document.getElementById('submitBtn').disabled = false;
    showResult('wrong','⚠️ 네트워크 오류', '인터넷 연결을 확인해주세요.<br>'+e.message, null);
  }
}

function showResult(type,title,body,answer) {
  const c = document.getElementById('resultCard');
  c.className='result-card show '+type; c.style.display='block';
  document.getElementById('resTitle').innerHTML=title;
  document.getElementById('resBody').innerHTML=body;
  const a = document.getElementById('resAnswer');
  if (answer) { a.textContent=answer; a.style.display='block'; }
  else a.style.display='none';
}

function nextQuestion() { loadQuestion(); }

// ══════════════════════════════════════════════════════
//  FINISH
// ══════════════════════════════════════════════════════
function showFinish() {
  showScreen('finishScreen');
  const pct = correctCount / TOTAL;
  const sc = pct>=.9?5:pct>=.7?4:pct>=.5?3:pct>=.3?2:1;
  document.getElementById('finStars').textContent = '⭐'.repeat(sc)+'☆'.repeat(5-sc);
  document.getElementById('finScore').textContent = score+'점';
  document.getElementById('statCorrect').textContent = correctCount+'/'+qIndex;
  document.getElementById('statCombo').textContent = maxCombo+'연속';
  document.getElementById('statHints').textContent = hintsUsed+'번';
  document.getElementById('statGrade').textContent = grade+'학년';
  const planets = ['🌱','🌊','⚡','🔥','🪐','🌌'];
  document.getElementById('finPlanet').textContent = planets[grade-1];
  const msgs = ['처음엔 누구나 어려워요! 다시 도전해봐요! 💪','조금 더 연습하면 완벽해질 거예요! 🔥','잘 했어요! 다음엔 더 잘할 수 있어요! ⭐','훌륭해요! 조금만 더 하면 만점! 🎯','정말 잘했어요! 멋진 실력이에요! 🏆'];
  document.getElementById('finMsg').textContent = msgs[Math.min(sc-1,msgs.length-1)];
  if (sc>=4) launchConfetti(true);
}

// ══════════════════════════════════════════════════════
//  EFFECTS
// ══════════════════════════════════════════════════════
function launchConfetti(big=false) {
  const n=big?60:25, colors=['#f9d923','#ff6b9d','#60efff','#39ff88','#ff9a3c','#a78bfa'];
  const wrap=document.createElement('div'); wrap.className='confetti-wrap';
  for(let i=0;i<n;i++){
    const c=document.createElement('div'); c.className='cf';
    c.style.cssText=`left:${Math.random()*100}%;background:${colors[i%colors.length]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;--d:${1+Math.random()*1.5}s;--dl:${Math.random()*.5}s;--dx:${(Math.random()-.5)*200}px;border-radius:${Math.random()>.5?'50%':'2px'};`;
    wrap.appendChild(c);
  }
  document.body.appendChild(wrap);
  setTimeout(()=>wrap.remove(),2500);
}

function showCombo() {
  if (comboCount<2) return;
  const el=document.getElementById('comboBurst');
  el.textContent=comboCount>=5?`🔥 ${comboCount}연속! 천재!`:comboCount>=3?`⚡ ${comboCount}연속! 대박!`:`🎯 ${comboCount}연속!`;
  el.style.display='block'; el.style.animation='none'; void el.offsetWidth;
  el.style.animation='burst .8s ease forwards';
  setTimeout(()=>el.style.display='none',900);
}

function makeStars() {
  const sf=document.getElementById('starfield');
  for(let i=0;i<80;i++){
    const s=document.createElement('div'); s.className='star-dot';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*3}s;`;
    sf.appendChild(s);
  }
}

window.addEventListener('DOMContentLoaded', ()=>{ initCanvas(); makeStars(); });
</script>
